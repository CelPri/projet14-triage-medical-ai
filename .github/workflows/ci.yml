name: CI/CD Medical Triage API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      INFERENCE_BACKEND: mock
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: pytest -q

  build-and-push-docker:
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/celpri/projet14-triage-api:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true'

    steps:
      - name: Deploy on GPU server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "${{ github.token }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            mkdir -p ~/models
            mkdir -p ~/logs/projet14

            docker pull ghcr.io/celpri/projet14-triage-api:main

            docker start qwen-vllm || docker run -d \
              --name qwen-vllm \
              --gpus all \
              -p 8000:8000 \
              -v ~/outputs/qwen3-dpo-merged:/model \
              vllm/vllm-openai:latest \
              --model /model \
              --served-model-name qwen3-dpo-merged \
              --dtype auto \
              --max-model-len 2048

            for i in {1..60}; do
              if curl -fs http://127.0.0.1:8000/v1/models; then
                break
              fi
              sleep 5
            done

            docker stop projet14-triage-api || true
            docker rm projet14-triage-api || true

            docker run -d \
              --name projet14-triage-api \
              --network host \
              -v ~/logs/projet14:/app/logs \
              -e INFERENCE_BACKEND=vllm \
              -e MODEL_VERSION=qwen3-dpo-merged-v1 \
              -e VLLM_BASE_URL=http://127.0.0.1:8000 \
              -e VLLM_MODEL_NAME=qwen3-dpo-merged \
              ghcr.io/celpri/projet14-triage-api:main

            sleep 5
            curl -f http://127.0.0.1:8080/health
